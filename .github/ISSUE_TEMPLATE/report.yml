name: Report a Bot Account
description: Report a suspected bot account on GitHub
title: "[REPORT] {username}"
labels: ["report"]
body:
  - type: markdown
    attributes:
      value: |
        ## Report a Suspected Bot Account

        This form is used by the automated reporting action. Manual submissions
        from trusted repos are also accepted.

  - type: input
    id: username
    attributes:
      label: Username
      description: "GitHub username of the suspected bot account"
      placeholder: "bot-user-123"
    validations:
      required: true

  - type: input
    id: reporting_repo
    attributes:
      label: Reporting Repository
      description: "Full name of the trusted repository submitting this report (owner/repo)"
      placeholder: "octocat/my-repo"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason
      description: "Why do you believe this is a bot account?"
      placeholder: "Automated spam comments, suspicious activity patterns..."
    validations:
      required: true

  - type: input
    id: evidence_url
    attributes:
      label: Evidence URL
      description: "Link to evidence (issue, PR, comment, etc.)"
      placeholder: "https://github.com/owner/repo/issues/123"
    validations:
      required: false
